# ── Backend Service ───────────────────────────────────────────────────────────
{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kreaimggen.fullname" . }}-backend
  labels:
    {{- include "kreaimggen.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "kreaimggen.name" . }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: 8000
      protocol: TCP
{{- end }}
---
# ── Flower Service ────────────────────────────────────────────────────────────
{{- if .Values.flower.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kreaimggen.fullname" . }}-flower
  labels:
    {{- include "kreaimggen.labels" . | nindent 4 }}
    app.kubernetes.io/component: flower
spec:
  type: {{ .Values.flower.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "kreaimggen.name" . }}
    app.kubernetes.io/component: flower
  ports:
    - name: http
      port: {{ .Values.flower.service.port }}
      targetPort: 5555
      protocol: TCP
{{- end }}
---
# ── Redis Service (headless + ClusterIP) ─────────────────────────────────────
{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kreaimggen.fullname" . }}-redis
  labels:
    {{- include "kreaimggen.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: {{ .Values.redis.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "kreaimggen.name" . }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: {{ .Values.redis.service.port }}
      targetPort: 6379
      protocol: TCP
{{- end }}
---
# ── Frontend Service ──────────────────────────────────────────────────────────
{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kreaimggen.fullname" . }}-frontend
  labels:
    {{- include "kreaimggen.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "kreaimggen.name" . }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: 80
      protocol: TCP
{{- end }}
