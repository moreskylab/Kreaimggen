{{- if .Values.worker.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kreaimggen.fullname" . }}-worker
  labels:
    {{- include "kreaimggen.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kreaimggen.name" . }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kreaimggen.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ include "kreaimggen.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command:
            - celery
            - -A
            - app.celery_app:celery_app
            - worker
            - --loglevel=info
            - --queues={{ .Values.worker.queues }}
            - --concurrency={{ .Values.worker.concurrency }}
            - --hostname=worker@%h
          env:
            - name: KREA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kreaimggen.fullname" . }}-app-secret
                  key: krea-api-key
            {{- include "kreaimggen.brokerEnv" . | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - app.celery_app:celery_app
                - inspect
                - ping
                - -d
                - worker@$HOSTNAME
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
