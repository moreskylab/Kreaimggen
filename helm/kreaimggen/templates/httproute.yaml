{{- if .Values.gateway.enabled -}}
# ── Gateway ────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.gatewayName }}
  namespace: {{ .Values.gateway.gatewayNamespace }}
  labels:
    {{- include "kreaimggen.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      protocol: {{ .Values.gateway.listener.protocol }}
      port: {{ .Values.gateway.listener.port }}
      allowedRoutes:
        namespaces:
          from: Same
---
# ── HTTPRoute: Frontend (catch-all) ───────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "kreaimggen.fullname" . }}-frontend-route
  labels:
    {{- include "kreaimggen.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
  hostnames:
    {{- range .Values.gateway.routes.frontend.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "kreaimggen.fullname" . }}-frontend
          port: {{ .Values.frontend.service.port }}
          weight: 100
---
# ── HTTPRoute: Backend (/api prefix) ─────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "kreaimggen.fullname" . }}-backend-route
  labels:
    {{- include "kreaimggen.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
  hostnames:
    {{- range .Values.gateway.routes.frontend.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.routes.backend.prefix }}
      # Strip /api prefix before passing to FastAPI
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ include "kreaimggen.fullname" . }}-backend
          port: {{ .Values.backend.service.port }}
          weight: 100
---
# ── HTTPRoute: Flower (internal/ops traffic) ─────────────────────────────────
{{- if .Values.flower.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "kreaimggen.fullname" . }}-flower-route
  labels:
    {{- include "kreaimggen.labels" . | nindent 4 }}
    app.kubernetes.io/component: flower
  annotations:
    # Restrict to internal CIDR via gateway policy in production
    nginx.gateway.kubernetes.io/allowed-response-headers: "X-Frame-Options"
spec:
  parentRefs:
    - name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
  hostnames:
    {{- range .Values.gateway.routes.frontend.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /flower
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ include "kreaimggen.fullname" . }}-flower
          port: {{ .Values.flower.service.port }}
{{- end }}
{{- end }}
