# ─── Global ────────────────────────────────────────────────────────────────
global:
  imageRegistry: ""          # e.g. "ghcr.io/yourorg/" – leave empty for local
  imagePullSecrets: []

# ─── Backend (FastAPI) ──────────────────────────────────────────────────────
backend:
  enabled: true
  replicaCount: 2
  image:
    repository: kreaimggen-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  env:
    DEBUG: "false"
    API_V1_STR: "/api/v1"
    ALGORITHM: "HS256"
    ACCESS_TOKEN_EXPIRE_MINUTES: "60"
    RATE_LIMIT_PER_MINUTE: "20"
  # Sensitive values – override via Kubernetes Secrets / external-secrets
  secretEnv:
    SECRET_KEY: ""
    KREA_API_KEY: ""
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ─── Worker (Celery) ────────────────────────────────────────────────────────
worker:
  enabled: true
  replicaCount: 2
  image:
    repository: kreaimggen-worker
    tag: latest
    pullPolicy: IfNotPresent
  concurrency: 4
  queues: "image_generation"
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "1Gi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60

# ─── Flower ─────────────────────────────────────────────────────────────────
flower:
  enabled: true
  replicaCount: 1
  image:
    repository: mher/flower
    tag: "2.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5555
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ─── Redis ──────────────────────────────────────────────────────────────────
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ─── Frontend (Nginx) ───────────────────────────────────────────────────────
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: kreaimggen-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ─── RabbitMQ ───────────────────────────────────────────────────────────────
rabbitmq:
  # Use bitnami/rabbitmq subchart or deploy separately.
  # Values below are passed through to the subchart if enabled.
  enabled: true
  auth:
    username: guest
    password: guest
  persistence:
    enabled: true
    size: 5Gi
# ─── PostgreSQL ────────────────────────────────────────────────────────────
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  database: kreaimggen
  auth:
    username: kreaimggen
    password: kreaimggen   # override via --set or external secret
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
# ─── Gateway API HTTPRoute ──────────────────────────────────────────────────
gateway:
  enabled: true
  gatewayName: kreaimggen-gateway
  gatewayNamespace: default
  className: nginx
  listener:
    port: 80
    protocol: HTTP
  routes:
    frontend:
      hostnames: ["kreaimggen.example.com"]
    backend:
      prefix: /api

# ─── Service Account ────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""
  annotations: {}
