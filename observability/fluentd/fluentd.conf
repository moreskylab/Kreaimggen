# fluentd.conf
# Collects logs from: FastAPI backend, Celery workers, Flower, Nginx frontend
# Ships to: Elasticsearch (adjust <store> blocks for Loki / Splunk / etc.)

# ── Input: collect container logs from Kubernetes ─────────────────────────────
<source>
  @type tail
  @id in_tail_container_logs
  path /var/log/containers/*kreaimggen*.log
  pos_file /var/log/fluentd-kreaimggen.log.pos
  tag kreaimggen.*
  read_from_head true
  <parse>
    @type multi_format
    <pattern>
      format json
      time_key time
      time_format %Y-%m-%dT%H:%M:%S.%NZ
    </pattern>
    <pattern>
      format /^(?<time>[^ ]+) (?<level>[^ ]+) \[(?<logger>[^\]]+)\] (?<message>.*)$/
      time_format %Y-%m-%dT%H:%M:%S.%N%z
    </pattern>
  </parse>
</source>

# ── Filter: enrich with Kubernetes metadata ───────────────────────────────────
<filter kreaimggen.**>
  @type kubernetes_metadata
  @id filter_kube_metadata
  skip_labels false
  skip_container_metadata false
</filter>

# ── Filter: parse Celery task lifecycle events ────────────────────────────────
<filter kreaimggen.**>
  @type grep
  <regexp>
    key message
    pattern /celery|task|worker|redis|rabbitmq|krea/i
  </regexp>
</filter>

<filter kreaimggen.**>
  @type record_transformer
  <record>
    environment production
    service_name kreaimggen
    component ${record.dig("kubernetes", "labels", "app.kubernetes.io/component") || "unknown"}
    pod_name ${record.dig("kubernetes", "pod_name") || "unknown"}
  </record>
</filter>

# ── Output: Elasticsearch ─────────────────────────────────────────────────────
<match kreaimggen.**>
  @type copy

  # Primary: Elasticsearch
  <store>
    @type elasticsearch
    @id out_es
    host "#{ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}"
    port "#{ENV['ELASTICSEARCH_PORT'] || 9200}"
    scheme http
    index_name kreaimggen-logs
    type_name _doc
    include_timestamp true
    reconnect_on_error true
    reload_on_failure true
    reload_connections false
    request_timeout 20s
    <buffer>
      @type file
      path /var/log/fluentd-buffers/kreaimggen.buffer
      flush_mode interval
      retry_type exponential_backoff
      flush_thread_count 2
      flush_interval 5s
      retry_forever false
      retry_max_interval 30
      chunk_limit_size 2M
      queue_limit_length 32
      overflow_action block
    </buffer>
  </store>

  # Secondary: stdout for debugging (disable in prod)
  <store>
    @type stdout
    @id out_stdout
  </store>
</match>
