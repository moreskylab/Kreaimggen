<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KreaImgGen – AI Image Generator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body { background: #0f0f1a; color: #e0e0ff; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    #result-img { max-width: 100%; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.6); }
    .spinner-overlay { display: none; position: fixed; inset:0; background: rgba(0,0,0,.6); z-index: 9999; }
  </style>
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand"><i class="bi bi-stars"></i> KreaImgGen</span>
  <div id="nav-auth">
    <a href="login.html" class="btn btn-outline-light btn-sm me-2">Login</a>
    <a href="register.html" class="btn btn-primary btn-sm">Register</a>
  </div>
  <div id="nav-user" class="d-none">
    <span class="me-3 text-light" id="nav-username"></span>
    <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<!-- ── Spinner overlay ────────────────────────────────────────────────────── -->
<div class="spinner-overlay d-flex align-items-center justify-content-center" id="spinner">
  <div class="text-center text-white">
    <div class="spinner-border mb-3" style="width:3rem;height:3rem;"></div>
    <p id="spinner-msg">Generating your image…</p>
  </div>
</div>

<!-- ── Main content ───────────────────────────────────────────────────────── -->
<main class="container py-5" style="max-width:780px">
  <h1 class="mb-1 fw-bold">AI Image Generator</h1>
  <p class="text-secondary mb-4">Describe anything – Krea AI will paint it.</p>

  <div id="auth-required-msg" class="alert alert-warning d-none">
    Please <a href="login.html">log in</a> to generate images.
  </div>

  <form id="generate-form" class="d-none">
    <div class="mb-3">
      <label for="prompt" class="form-label fw-semibold">Prompt</label>
      <textarea id="prompt" class="form-control bg-dark text-light border-secondary"
                rows="3" placeholder="A photorealistic sunrise over the Sahara desert, golden hour, 8K…" required></textarea>
    </div>
    <div class="mb-3">
      <label for="neg-prompt" class="form-label fw-semibold">Negative Prompt <span class="text-secondary fw-normal">(optional)</span></label>
      <input id="neg-prompt" type="text" class="form-control bg-dark text-light border-secondary"
             placeholder="blurry, low quality, oversaturated" />
    </div>

    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <label class="form-label">Width</label>
        <select id="width" class="form-select bg-dark text-light border-secondary">
          <option>512</option><option selected>768</option><option>1024</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label">Height</label>
        <select id="height" class="form-select bg-dark text-light border-secondary">
          <option>512</option><option selected>768</option><option>1024</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label">Steps <span id="steps-val">30</span></label>
        <input id="steps" type="range" class="form-range" min="10" max="60" value="30"
               oninput="document.getElementById('steps-val').textContent=this.value" />
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label">Guidance <span id="guidance-val">7.5</span></label>
        <input id="guidance" type="range" class="form-range" min="1" max="20" step="0.5" value="7.5"
               oninput="document.getElementById('guidance-val').textContent=this.value" />
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-lg w-100">
      <i class="bi bi-magic me-1"></i> Generate Image
    </button>
  </form>

  <!-- Result area -->
  <div id="result-area" class="mt-5 d-none text-center">
    <img id="result-img" src="" alt="Generated image" />
    <div class="mt-3">
      <a id="download-link" href="#" download="kreaimggen.png" class="btn btn-outline-light btn-sm">
        <i class="bi bi-download me-1"></i> Download
      </a>
    </div>
  </div>

  <div id="error-msg" class="alert alert-danger mt-4 d-none"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
