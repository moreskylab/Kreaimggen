<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login – KreaImgGen</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    body { background: #0f0f1a; color: #e0e0ff; }
    .card { background: #1a1a2e; border: 1px solid #2a2a4a; }
  </style>
</head>
<body class="d-flex min-vh-100 align-items-center justify-content-center">

<div class="card p-4 shadow-lg" style="width:100%;max-width:420px">
  <h2 class="mb-4 text-center fw-bold">Sign In</h2>

  <div id="login-error" class="alert alert-danger d-none"></div>

  <form id="login-form">
    <div class="mb-3">
      <label for="username" class="form-label">Username</label>
      <input id="username" type="text" class="form-control bg-dark text-light border-secondary"
             autocomplete="username" required />
    </div>
    <div class="mb-4">
      <label for="password" class="form-label">Password</label>
      <input id="password" type="password" class="form-control bg-dark text-light border-secondary"
             autocomplete="current-password" required />
    </div>
    <button type="submit" class="btn btn-primary w-100">Login</button>
  </form>

  <p class="text-center mt-3 text-secondary">
    No account? <a href="register.html" class="text-light">Register</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js?v=2"></script>
<script>
  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl = document.getElementById("login-error");
    errEl.classList.add("d-none");

    const body = new URLSearchParams({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value,
    });

    try {
      const res = await fetch("/api/v1/auth/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body,
      });
      if (!res.ok) throw new Error(((await res.json().catch(() => ({}))).detail) || `${res.status} ${res.statusText}`);
      const data = await res.json();
      localStorage.setItem("jwt_token", data.access_token);
      window.location.href = "index.html";
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove("d-none");
    }
  });
</script>
</body>
</html>
