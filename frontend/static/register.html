<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register – KreaImgGen</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    body { background: #0f0f1a; color: #e0e0ff; }
    .card { background: #1a1a2e; border: 1px solid #2a2a4a; }
  </style>
</head>
<body class="d-flex min-vh-100 align-items-center justify-content-center">

<div class="card p-4 shadow-lg" style="width:100%;max-width:420px">
  <h2 class="mb-4 text-center fw-bold">Create Account</h2>

  <div id="reg-error"   class="alert alert-danger  d-none"></div>
  <div id="reg-success" class="alert alert-success d-none">
    Account created! <a href="login.html" class="alert-link">Log in now.</a>
  </div>

  <form id="register-form">
    <div class="mb-3">
      <label for="username" class="form-label">Username</label>
      <input id="username" type="text" class="form-control bg-dark text-light border-secondary"
             minlength="3" maxlength="50" autocomplete="username" required />
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input id="email" type="email" class="form-control bg-dark text-light border-secondary"
             autocomplete="email" required />
    </div>
    <div class="mb-4">
      <label for="password" class="form-label">Password</label>
      <input id="password" type="password" class="form-control bg-dark text-light border-secondary"
             minlength="8" autocomplete="new-password" required />
      <div class="form-text text-secondary">At least 8 characters.</div>
    </div>
    <button type="submit" class="btn btn-primary w-100">Register</button>
  </form>

  <p class="text-center mt-3 text-secondary">
    Already have an account? <a href="login.html" class="text-light">Login</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById("register-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errEl  = document.getElementById("reg-error");
    const succEl = document.getElementById("reg-success");
    errEl.classList.add("d-none");
    succEl.classList.add("d-none");

    const payload = {
      username: document.getElementById("username").value,
      email:    document.getElementById("email").value,
      password: document.getElementById("password").value,
    };

    try {
      const res = await fetch("/api/v1/auth/register", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(((await res.json().catch(() => ({}))).detail) || `${res.status} ${res.statusText}`);
      succEl.classList.remove("d-none");
      document.getElementById("register-form").reset();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove("d-none");
    }
  });
</script>
</body>
</html>
