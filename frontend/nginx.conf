server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # JS/CSS: revalidate every hour (no content-hash in filenames → never use immutable)
    location ~* \.(?:js|css)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Static assets with long-term caching (images, fonts – rarely change)
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all unknown paths → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api → backend service
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Security headers
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-Content-Type-Options    nosniff;
    add_header Referrer-Policy           strict-origin-when-cross-origin;
    add_header Permissions-Policy        "camera=(), microphone=()";

    gzip            on;
    gzip_comp_level 5;
    gzip_types      text/plain text/css application/json application/javascript text/javascript;
}
